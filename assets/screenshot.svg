<svg xmlns="http://www.w3.org/2000/svg" width="566" height="348" viewBox="0 0 566 348" font-family="'Menlo','SF Mono',Monaco,Consolas,monospace" font-size="14">
<rect width="566" height="348" fill="#1e1f24" rx="8"/>
<text x="14" y="28" fill="#c8c8c8"  xml:space="preserve"> </text>
<text x="22.4" y="28" fill="#d4d4d4"  xml:space="preserve">list the files here, read hello.txt, and check the node version</text>
<rect x="14" y="94" width="538" height="20" fill="#283228"/>
<text x="14" y="108" fill="#c8c8c8"  xml:space="preserve"> </text>
<text x="22.4" y="108" fill="#c8c8c8" font-weight="bold" xml:space="preserve">ls</text>
<text x="39.2" y="108" fill="#c8c8c8"  xml:space="preserve"> 列出当前目录文件</text>
<rect x="14" y="114" width="538" height="20" fill="#283228"/>
<text x="14" y="128" fill="#c8c8c8"  xml:space="preserve">   </text>
<text x="39.2" y="128" fill="#c8c8c8"  xml:space="preserve">2 entries</text>
<text x="114.80000000000001" y="128" fill="#c8c8c8"  xml:space="preserve"> </text>
<text x="123.20000000000002" y="128" fill="#c8c8c8"  xml:space="preserve">.</text>
<rect x="14" y="194" width="538" height="20" fill="#283228"/>
<text x="14" y="208" fill="#c8c8c8"  xml:space="preserve"> </text>
<text x="22.4" y="208" fill="#c8c8c8" font-weight="bold" xml:space="preserve">read</text>
<text x="56" y="208" fill="#c8c8c8"  xml:space="preserve"> 读取 hello.txt 内容</text>
<text x="14" y="228" fill="#c8c8c8"  xml:space="preserve">   </text>
<text x="39.2" y="228" fill="#4e9a06"  xml:space="preserve">2 lines</text>
<text x="98" y="228" fill="#c8c8c8"  xml:space="preserve"> </text>
<text x="106.4" y="228" fill="#c8c8c8"  xml:space="preserve">hello.txt</text>
<rect x="14" y="294" width="538" height="20" fill="#283228"/>
<text x="14" y="308" fill="#c8c8c8"  xml:space="preserve"> </text>
<text x="22.4" y="308" fill="#c8c8c8" font-weight="bold" xml:space="preserve">bash</text>
<text x="56" y="308" fill="#c8c8c8"  xml:space="preserve"> 查看 Node 版本</text>
<text x="14" y="328" fill="#c8c8c8"  xml:space="preserve">   </text>
<text x="39.2" y="328" fill="#4e9a06"  xml:space="preserve">✓</text>
<text x="47.6" y="328" fill="#c8c8c8"  xml:space="preserve"> </text>
<text x="56" y="328" fill="#c8c8c8"  xml:space="preserve">node --version</text>
</svg>